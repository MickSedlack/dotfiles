[bar/mybar]
monitor = ${env:MONITOR:}
font-0 = "Inconsolata Nerd Font Mono:pixelsize=16; 3"
modules-right = dunst-pulseaudio
modules-left = i3
modules-center = date
modules-right = dunst-pulseaudio powerdrun wireless-network

[module/i3]
type = internal/i3
label-focused = |%index%|
index-sort = true
enable-click = true
enable-scroll = true
pin-workspaces = true
scroll-up = i3-msg workspace next_on_output
scroll-down = i3-msg workspace prev_on_output
label-active-font = 0

[module/date]
type = internal/date
date = %a, %d-%m-%Y
time = %H:%M
label-active-font = 0
label = %time% %date%

[module/wireless-network]
type = internal/network
interface = wlp1s0
interface-type = wireless
label-connected = %netspeed:9%
format-connected = <label-connected>
format-disconnected = <label-disconnected>

[module/alsa]
type = internal/alsa
label-active-font = 0
format-volume = <ramp-volume> <label-volume>
label-muted = 󰖁 0% 
ramp-volume-0 = 󰕿
ramp-volume-1 = 󰖀    
ramp-volume-2 = 󰕾  

[module/dunst-pulseaudio]
type = custom/script
label-active-font = 0
tail = true
exec = pamixer --get-volume-human
click-left = ~/.config/dunst/dun_vol.sh mute &
scroll-up = ~/.config/dunst/dun_vol.sh up &
scroll-down = ~/.config/dunst/dun_vol.sh down &

[module/powerdrun]
type = custom/script
label-active-font = 0
exec = echo "  <3"
click-left = ~/.config/drun/9menupower.sh &
