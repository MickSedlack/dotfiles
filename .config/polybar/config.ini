[bar/mybar]
monitor = ${env:MONITOR:}
font-0 = "Inconsolata Nerd Font Mono:pixelsize=16; 3"
modules-right = dunst-pulseaudio
modules-left = i3 menu-apps
modules-center = date calendar 
modules-right = dunst-pulseaudio wireless-network

[module/i3]
type = internal/i3
label-focused = |%index%|
index-sort = true
enable-click = true
enable-scroll = true
pin-workspaces = true
scroll-up = i3-msg workspace next_on_output
scroll-down = i3-msg workspace prev_on_output
label-active-font = 0

[module/date]
type = internal/date
date = %a, %d-%m-%Y
time = %H:%M
label-active-font = 0
label = %time% %date%

[module/wireless-network]
type = internal/network
interface = wlp1s0
interface-type = wireless
label-connected = %netspeed:9%
format-connected = <label-connected>
format-disconnected = <label-disconnected>

[module/alsa]
type = internal/alsa
label-active-font = 0
format-volume = <ramp-volume> <label-volume>
label-muted = 󰖁 0% 
ramp-volume-0 = 󰕿
ramp-volume-1 = 󰖀    
ramp-volume-2 = 󰕾  

[module/dunst-pulseaudio]
type = custom/script
label-active-font = 0
tail = true
exec = pamixer --get-volume-human
click-left = ~/.config/dunst/dun_vol.sh mute &
scroll-up = ~/.config/dunst/dun_vol.sh up &
scroll-down = ~/.config/dunst/dun_vol.sh down &

[module/calendar]
type = custom/script
label = "󰃭"
exec = echo Calendar
click-left = ~/.config/dunst/calendar curr
scroll-up = ~/.config/dunst/calendar next
scroll-down = ~/.config/dunst/calendar prev

[module/menu-apps]
type = custom/menu
expand-right = true
menu-0-0 = Power
menu-0-0-exec = #menu-apps.open.1
menu-0-1 = Search
menu-0-1-exec = #menu-apps.open.2

menu-1-0 = Reload
menu-1-0-exec = pkill sxhkd && sxhkd
menu-1-1 = Logout
menu-1-1-exec = pkill -u $USER
menu-1-2 = Suspend
menu-1-2-exec = systemctl suspend
menu-1-3 = Reboot
menu-1-3-exec = systemctl reboot
menu-1-4 = Shutdown
menu-1-4-exec = systemctl shutdown

menu-2-0 = All Apps
menu-2-0-exec = ~/.config/drun/customrun.sh 1 &
menu-2-1 = Specific
menu-2-1-exec = ~/.config/drun/customrun.sh 2 &
label-open = "  <3"
label-close= "  <<"
label-separator = "|"

