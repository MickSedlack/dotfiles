[bar/mybar]
monitor = ${env:MONITOR:}
font-0 = "Inconsolata Nerd Font Mono:pixelsize=16; 0"
modules-left = i3
modules-center = date
modules-right = alsa

[module/i3]
type = internal/i3
label-focused = {%index%}
index-sort = true
enable-click = true
enable-scroll = true
pin-workspaces = true
scroll-up = i3-msg workspace next_on_output
scroll-down = i3-msg workspace prev_on_output
label-active-font = 1


[module/date]
type = internal/date
date = %a, %d-%m-%Y
time = %H:%M
label-active-font = 0
label = %time% %date%

[module/alsa]
type = internal/alsa
label-active-font = 0
format-volume = <ramp-volume> <label-volume>
label-muted = 󰖁 0% 
ramp-volume-0 = 󰕿
ramp-volume-1 = 󰖀    
ramp-volume-2 = 󰕾  
